# This workflow is hand-maintained. Do NOT regenerate it with
# `maturin generate-ci` — that clobbers the commit-SHA action pins below.
# Every `uses:` ref is pinned to a commit SHA with the human-readable
# version tag in a trailing comment (e.g. `@<sha>  # v7.0.0`); the
# lint-workflows (zizmor) job enforces SHA pinning on every PR. Bump pins
# per the cooldown policy in CLAUDE.md ("Version-selection policy").
name: CI

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: aarch64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          submodules: 'true'
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: 3.13
      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b  # v1.51.0
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist
      - name: unit tests (x86_64)
        if: ${{ startsWith(matrix.platform.target, 'x86_64') }}
        shell: bash
        # disabling the PyPI index on `pip install cedarpy` to ensure we
        # install cedarpy from the local folder
        run: |
          set -e
          python3 -m venv .venv
          source .venv/bin/activate
          pip install cedarpy --no-index --find-links dist --force-reinstall
          pip install -r requirements.txt -r requirements.dev.txt
          pytest
      - name: integration tests (x86_64)
        if: ${{ startsWith(matrix.platform.target, 'x86_64') }}
        shell: bash
        run: |
          set -e
          source .venv/bin/activate
          make integration-tests
      - name: unit & integration tests (aarch64)
        if: ${{ startsWith(matrix.platform.target, 'aarch64') }}
        uses: uraimo/run-on-arch-action@f9b26e3a1a408d5fd530d20c17b9f3f4428ff8d9  # v3.1.0
        with:
          arch: ${{ matrix.platform.target }}
          distro: ubuntu22.04
          githubToken: ${{ github.token }}
          install: |
            apt-get update
            apt-get install -y --no-install-recommends python3 python3-pip python3.10-venv
          run: |
            set -e
            python3 -m venv .venv
            source .venv/bin/activate
            pip3 install cedarpy --no-index --find-links dist --force-reinstall
            pip install -r requirements.txt -r requirements.dev.txt
            echo 'running unit tests'
            pytest
            echo 'running integration tests'
            # Run only the hand-written suite. Pointing at the whole
            # tests/integration dir would also collect the ~60K-case
            # corpus suite (test_cedar_corpus_tests.py), which is meant
            # to be opt-in via `make corpus-tests` and is far too slow
            # under aarch64 emulation.
            pytest tests/integration/test_cedar_integration_tests.py

  windows:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          submodules: 'true'
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: 3.13
          architecture: ${{ matrix.platform.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b  # v1.51.0
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist
      - name: pytest
        if: ${{ !startsWith(matrix.platform.target, 'aarch64') }}
        shell: bash
        # disabling the PyPI index on `pip install cedarpy` to ensure we
        # install cedarpy from the local folder
        run: |
          set -e
          python3 -m venv .venv
          source .venv/Scripts/activate
          pip install cedarpy --no-index --find-links dist --force-reinstall
          pip install pytest
          pytest

  macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-14
            target: aarch64
          - runner: macos-15-intel
            target: x86_64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          submodules: 'true'
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: 3.13
      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b  # v1.51.0
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist
      - name: pytest
        # disabling the PyPI index on `pip install cedarpy` to ensure we
        # install cedarpy from the local folder
        run: |
          set -e
          python3 -m venv .venv
          source .venv/bin/activate
          pip install cedarpy --no-index --find-links dist --force-reinstall
          pip install pytest
          pytest

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Build sdist
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b  # v1.51.0
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: wheels-sdist
          path: dist

  release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    needs: [linux, windows, macos, sdist]
    # Requires a GitHub environment named "pypi-release" and a matching
    # PyPI trusted publisher configured at
    # https://pypi.org/manage/project/cedarpy/settings/publishing/
    environment: pypi-release
    permissions:
      # Mint short-lived OIDC tokens for PyPI trusted publishing and for
      # build-provenance attestation
      id-token: write
      # Used to upload release artifacts
      contents: write
      # Used to generate artifact attestation
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: 'wheels-*/*'
      - name: Publish to PyPI
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b  # v1.51.0
        with:
          command: upload
          args: --non-interactive --skip-existing wheels-*/*

  # Supply-chain guardrail: zizmor audits the workflows for unpinned
  # actions, script injection, dangerous triggers, and over-broad
  # permissions. Run via `pipx run` (preinstalled on ubuntu-latest) to
  # keep the only SHA-pinned third-party action here to actions/checkout.
  lint-workflows:
    name: Lint workflows (zizmor)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Audit workflows with zizmor
        env:
          GH_TOKEN: ${{ github.token }}
        run: pipx run zizmor==1.25.2 .github/workflows/
